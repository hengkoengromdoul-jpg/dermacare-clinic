<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Terminal — DermaCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #9ab7f1;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .khqr-box {
            background: linear-gradient(135deg, #eef2f7 0%, #dbeafe 100%);
            border: 2px solid #2b56f5;
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }
        .qr-mock {
            width: 220px;
            height: 220px;
            background: white;
            border: 8px solid white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-white">
                <div class="p-4 text-center bg-dark text-white">
                    <h4 class="fw-bold m-0"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Secure Digital Gateway</h4>
                    <span class="text-white-50 small">Reference Token ID: INV-#{{ invoice.invoice_id }}</span>
                </div>
                
                <div class="card-body p-4 text-center">
                    <span class="text-uppercase text-muted small fw-bold d-block tracking-wider">Total Consultation Due Amount</span>
                    <h1 class="display-4 fw-black text-primary my-2">${{ "%.2f"|format(invoice.total_amount) }}</h1>
                    
                    <div class="khqr-box my-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="fw-bold text-primary small"><i class="bi bi-qr-code-scan me-1"></i> KHQR INTERBANK</span>
                            <span class="badge bg-primary rounded-pill text-uppercase">DermaCare Pay</span>
                        </div>
                        
                        <div class="qr-mock">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data={{ qr_payload }}" alt="Scan Matrix QR Link Code" class="img-fluid rounded-2">
                        </div>
                        
                        <p class="text-muted small mt-3 mb-0"><i class="bi bi-phone-vibrate text-primary me-1"></i> Scan with your preferred local mobile banking app to instant pay</p>
                    </div>

                    <form action="/process_payment" method="POST">
                        <input type="hidden" name="invoice_id" value="{{ invoice.invoice_id }}">
                        <input type="hidden" name="amount" value="{{ invoice.total_amount }}">
                        <input type="hidden" name="payment_method" value="KHQR Dynamic Pay">

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm mb-3">
                            <i class="bi bi-check-all me-1"></i> I Have Scanned & Paid
                        </button>
                    </form>
                    
                    <a href="/patient_dashboard" class="text-decoration-none text-muted small fw-medium">
                        <i class="bi bi-arrow-left me-1"></i> Cancel & Back to Dashboard
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
