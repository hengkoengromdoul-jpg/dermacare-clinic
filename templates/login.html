<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DermaCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid #e2e8f0;
        }
        .brand-title {
            color: #347aeb;
            font-weight: 700;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .brand-subtitle {
            text-align: center;
            color: #4f84cf;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            margin-bottom: 1.25rem;
        }
        .btn-login {
            background-color: #4369e7;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #1c48e6;
        }
        .alert-flash {
            background-color: #fee2e2;
            color: #3538e6;
            border: 1px solid #fecaca;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">DermaCare</div>
        <div class="brand-subtitle">Welcome back! Please login</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-flash">
                        <strong>Error:</strong> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div>
                <label class="form-label small fw-bold text-muted">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            
            <div>
                <label class="form-label small fw-bold text-muted">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login mt-2">Login</button>
        </form>

        <div class="text-center mt-4 small">
            <span class="text-muted">Don't have an account?</span> 
            <a href="/register" style="color: #0d9488; font-weight: 600; text-decoration: none;">Register here</a>
        </div>
    </div>

</body>
</html>
