<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Available Schedules</title>
</head>
<body style="background-image: url('{{ url_for('static', filename='background.png') }}');">
    <div class="container mt-5">
        <h2 class="text-white mb-4">Doctor Availability</h2>
        <div class="row">
            {% for s in schedules %}
            <div class="col-md-4">
                <div class="card glass-box mb-3"> <!-- Using your glass-style boxes -->
                    <div class="card-body">
                        <h5 class="card-title">Day: {{ s.available_day }}</h5>
                        <p class="card-text">Time: {{ s.start_time }} - {{ s.end_time }}</p>
                        <button class="btn btn-primary">Book Now</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
